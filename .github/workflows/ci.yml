name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.0"
      - run: mix format --check-formatted
      - run: mix test

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo run -q -p kyuubiki-benchmark -- --profile medium --repeat 3 --baseline-compare benchmarks/medium-baseline.json --fail-on-median-regression-pct 25 --fail-on-rss-regression-pct 20 --min-baseline-median-ms 1.0
