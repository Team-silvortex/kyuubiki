name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.0"
      - uses: actions/cache@v4
        with:
          path: |
            apps/web/deps
            apps/web/_build
          key: ${{ runner.os }}-beam-web-${{ hashFiles('apps/web/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beam-web-
      - run: mix format --check-formatted
      - run: mix test

  rust:
    name: rust-test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: workers/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workers/rust
            sdks/rust
      - run: cargo fmt --check
      - run: cargo test
      - name: Audit Rust source line counts
        working-directory: .
        run: node ./scripts/audit-rust-line-counts.mjs --max 600
      - run: cargo run -q -p kyuubiki-benchmark -- --profile medium --repeat 3 --baseline-compare benchmarks/medium-baseline.json --fail-on-median-regression-pct 25 --fail-on-rss-regression-pct 20 --min-baseline-median-ms 1.0

  frontend:
    name: frontend-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  workflow-preflight:
    name: workflow-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start frontend dev server
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3000 > /tmp/kyuubiki-workflow-preflight-dev.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/workflow-benchmark >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "workflow benchmark route did not become ready in time" >&2
          tail -n 120 /tmp/kyuubiki-workflow-preflight-dev.log >&2 || true
          exit 1
      - run: npm run check:workflow-preflight
      - name: Upload workflow preflight server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-preflight-dev-log-${{ github.run_attempt }}
          path: /tmp/kyuubiki-workflow-preflight-dev.log
          if-no-files-found: ignore

  sdk-smoke:
    name: sdk-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [web, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.0"
      - uses: actions/cache@v4
        with:
          path: |
            sdks/elixir/deps
            sdks/elixir/_build
          key: ${{ runner.os }}-beam-sdk-${{ hashFiles('sdks/elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beam-sdk-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdks/rust
      - run: zsh ./scripts/kyuubiki sdk-smoke

  integration-smoke:
    name: integration-smoke-${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [web, rust]
    strategy:
      fail-fast: false
      matrix:
        target: [api, cluster, direct-mesh]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.0"
      - uses: actions/cache@v4
        with:
          path: |
            apps/web/deps
            apps/web/_build
          key: ${{ runner.os }}-beam-web-${{ hashFiles('apps/web/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beam-web-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workers/rust
      - name: Ensure screen is available
        run: |
          if ! command -v screen >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y screen
          fi
      - name: Install frontend deps for direct mesh
        if: matrix.target == 'direct-mesh'
        working-directory: apps/frontend
        run: npm ci
      - name: Run integration smoke
        run: |
          case "${{ matrix.target }}" in
            api) make test-integration-api ;;
            cluster) make test-integration-cluster ;;
            direct-mesh) make test-integration-direct-mesh ;;
          esac
      - name: Upload integration runtime logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-${{ matrix.target }}-${{ github.run_attempt }}
          path: tmp/run
          if-no-files-found: ignore
      - name: Summarize integration failure logs
        if: failure()
        run: |
          {
            echo "## Integration Failure Summary: ${{ matrix.target }}"
            echo
            if [ -d tmp/run ]; then
              echo "### Available Logs"
              echo
              echo '```text'
              find tmp/run -maxdepth 1 -type f | sort
              echo '```'
              echo

              for log in $(find tmp/run -maxdepth 1 -type f | sort); do
                echo "### Signals: ${log}"
                echo
                if grep -E -i -m 40 'error|exception|panic|timed out|timeout|refused|failed|failure|undefined|denied|unauthorized|invalid|traceback' "$log" >/tmp/kyuubiki-log-signals.txt 2>/dev/null; then
                  echo '```text'
                  cat /tmp/kyuubiki-log-signals.txt
                  echo '```'
                else
                  echo "_No high-signal error lines matched the default patterns._"
                fi
                echo

                echo "### Tail: ${log}"
                echo
                echo '```text'
                tail -n 80 "$log" || true
                echo '```'
                echo
              done
            else
              echo "No tmp/run directory was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  desktop-gui-smoke:
    name: desktop-gui-smoke-${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: hub
            working_directory: apps/hub-gui
            cache_path: apps/hub-gui/package-lock.json
          - target: installer
            working_directory: apps/installer-gui
            cache_path: apps/installer-gui/package-lock.json
          - target: workbench
            working_directory: apps/workbench-gui
            cache_path: apps/workbench-gui/package-lock.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.cache_path }}
      - working-directory: ${{ matrix.working_directory }}
        run: npm ci
      - working-directory: ${{ matrix.working_directory }}
        run: npm run test:smoke

  desktop-gui-regression:
    name: desktop-gui-regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - working-directory: apps/frontend
        run: npm ci
      - working-directory: apps/frontend
        run: npx playwright install --with-deps chromium
      - name: Run desktop GUI regression gate
        run: make test-integration-desktop-gui
      - name: Upload desktop GUI regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-gui-regression-artifacts-${{ github.run_attempt }}
          path: tmp/desktop-gui-regression-artifacts
          if-no-files-found: ignore
      - name: Summarize desktop GUI regression artifacts
        if: failure()
        run: |
          {
            echo "## Desktop GUI Regression Artifacts"
            echo
            if [ -d tmp/desktop-gui-regression-artifacts ]; then
              echo "### Latest screenshots"
              echo
              latest_pngs="$(find tmp/desktop-gui-regression-artifacts -type f -name '*.png' | sort | tail -n 12)"
              if [ -n "$latest_pngs" ]; then
                echo '```text'
                printf '%s\n' "$latest_pngs"
                echo '```'
              else
                echo "_No screenshot files were captured._"
              fi
              echo

              echo "### Latest DOM snapshots"
              echo
              latest_html="$(find tmp/desktop-gui-regression-artifacts -type f -name '*.html' | sort | tail -n 12)"
              if [ -n "$latest_html" ]; then
                echo '```text'
                printf '%s\n' "$latest_html"
                echo '```'
              else
                echo "_No HTML snapshot files were captured._"
              fi
              echo

              echo "### Latest JSON state summaries"
              echo
              latest_json="$(find tmp/desktop-gui-regression-artifacts -type f -name '*.json' | sort | tail -n 12)"
              if [ -n "$latest_json" ]; then
                echo '```text'
                printf '%s\n' "$latest_json"
                echo '```'

                echo
                echo "### Parsed failure overview"
                echo
                echo "| Suite | Scenario | Viewport | Title | Location | Mock Errors |"
                echo "| --- | --- | --- | --- | --- | ---: |"
                printf '%s\n' "$latest_json" | while IFS= read -r file; do
                  python3 -c 'import json, pathlib, sys; file = pathlib.Path(sys.argv[1]); payload = json.loads(file.read_text()); state = payload.get("state") or {}; clean = lambda value: str(value or "--").replace("|", "/"); print(f"| {clean(payload.get(\"suite\") or file.parent.name)} | {clean(payload.get(\"scenario\"))} | {clean(payload.get(\"viewport\"))} | {clean(state.get(\"title\"))} | {clean(state.get(\"location\"))} | {len(state.get(\"mockErrors\") or [])} |")' "$file" \
                    || echo "| $(basename "$(dirname "$file")") | unreadable | -- | -- | $file | parse error |"
                done
              else
                echo "_No JSON summary files were captured._"
              fi
              echo

              echo "### Captured files"
              echo
              echo '```text'
              find tmp/desktop-gui-regression-artifacts -type f | sort
              echo '```'
            else
              echo "No desktop GUI regression artifacts were captured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
